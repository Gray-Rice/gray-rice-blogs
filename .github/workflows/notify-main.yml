name: Notify main site to bump blog submodule

on:
  push:
    branches: ["main"]
    paths:
      - "_posts/**"
      - "**/*.md"
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger main repo workflow_dispatch
        env:
          GH_TOKEN: ${{ secrets.MAIN_REPO_PAT }}
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            https://api.github.com/repos/Gray-Rice/Gray-Rice.github.io/actions/workflows/bump-blog-submodule.yml/dispatches \
            -d '{"ref":"main"}'